backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: assets/blog-images
public_folder: /assets/blog-images

collections:
  - name: posts
    label: Blog Posts
    folder: posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{fields.slug}}"
    preview_path: "/post?slug={{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: URL Slug, name: slug, widget: string, hint: "URL-friendly version of the title e.g. my-first-post" }
      - { label: Publish Date, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, default: "" }
      - { label: Excerpt, name: excerpt, widget: text, hint: "Short summary shown on the blog listing page" }
      - { label: Cover Image, name: cover, widget: image, required: false, choose_url: false }
      - { label: Tags, name: tags, widget: list, required: false, hint: "Comma-separated tags e.g. AI, Adelaide, Business" }
      - { label: Body, name: body, widget: markdown }
