<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0f1d"/>
      <stop offset="100%" stop-color="#141728"/>
    </linearGradient>
    <linearGradient id="gl" x1="4" y1="6" x2="24" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none"
        stroke="rgba(129,140,248,0.18)" stroke-width="1"/>

  <!-- Letter mark -->
  <text x="14" y="25" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="24" font-weight="800" fill="url(#gl)">a</text>

  <!-- Cyan accent dot -->
  <circle cx="25" cy="8" r="3" fill="#22d3ee"/>
</svg>
