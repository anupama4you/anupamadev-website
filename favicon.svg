<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0f1d"/>
      <stop offset="100%" stop-color="#141728"/>
    </linearGradient>
    <linearGradient id="gl" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none"
        stroke="rgba(129,140,248,0.2)" stroke-width="1"/>

  <!-- Antenna -->
  <line x1="16" y1="3" x2="16" y2="7" stroke="url(#gl)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="2.5" r="1.5" fill="#22d3ee"/>

  <!-- Head -->
  <rect x="7" y="7" width="18" height="13" rx="3" fill="url(#gl)"/>

  <!-- Eyes -->
  <rect x="10" y="11" width="4" height="3" rx="1" fill="#0d0f1d"/>
  <rect x="18" y="11" width="4" height="3" rx="1" fill="#0d0f1d"/>
  <!-- Eye glow -->
  <rect x="11" y="11.8" width="1.5" height="1.5" rx="0.5" fill="#22d3ee"/>
  <rect x="19" y="11.8" width="1.5" height="1.5" rx="0.5" fill="#22d3ee"/>

  <!-- Mouth -->
  <rect x="12" y="16" width="8" height="2" rx="1" fill="#0d0f1d" opacity="0.6"/>

  <!-- Body -->
  <rect x="10" y="21" width="12" height="8" rx="2" fill="url(#gl)" opacity="0.85"/>

  <!-- Body detail -->
  <circle cx="14" cy="25" r="1.2" fill="#22d3ee" opacity="0.9"/>
  <circle cx="18" cy="25" r="1.2" fill="#c084fc" opacity="0.9"/>
</svg>
